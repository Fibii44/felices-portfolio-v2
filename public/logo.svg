<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 70">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.95 0 0 0 0 0.45 0 0 0 0 0.71 0 0 0 1 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g fill="#F472B6" filter="url(#glow)">
    <rect x="0" y="0" width="50" height="10" />
    <rect x="0" y="0" width="10" height="70" />
    <rect x="0" y="30" width="40" height="10" />
  </g>
</svg>